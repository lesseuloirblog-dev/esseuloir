baseurl = "https://www.esseuloir.fr/"
title = "L'esseuloir"
theme = "hugo-theme-cleanwhite"
languageCode = "fr-FR"
defaultContentLanguage = "fr"
preserveTaxonomyNames = true
hasCJKLanguage = false
relativeURLs = false
canonifyURLs = true

[services]
  # Enable comments by entering your Disqus shortname
  [services.disqus]
    shortname = ""
  [services.googleAnalytics]
    id = ""

[pagination]
  pagerSize = 5 # frontpage pagination

[outputs]
home = ["HTML", "RSS"]

[params]
  header_image = "img/bg.jpg"
  SEOTitle = "L'esseuloir"
  description = "L'esseuloir"
  keyword = "L'esseuloir"
  slogan = "Dans le vide personne ne vous entendra hurler"
  upstreamAttribution = false

  image_404 = "img/404.jpg"
  title_404 = "Vous qui errez ici, oubliez toute espérance !"
  omit_categories = false

  # leancloud storage for page view counter
  page_view_counter = false
  leancloud_app_id = ""
  leancloud_app_key = ""

  # algolia site search
  algolia_search = false
  algolia_appId = ""
  algolia_indexName = ""
  algolia_apiKey = ""

  # Sidebar settings
  sidebar_about_description = "Acrobate maladroit, ivre de vertige, toujours à un seul pas de la chute.</br></br>Poète par accident ou par facilité, parfois les deux - souvent en réalité. </br></br>Irresponsable notoire, éternel impatient, aussi vieux que Mathusalem, pathologiquement misanthrope, bref, un homme qui gagne à ne pas être connu. </br></br>Aime se perdre dans la foule et dans les reflets."
  sidebar_avatar = "img/self.jpg"    # use absolute URL, seeing it's used in both `/` and `/about/`

  featured_tags = false 
  featured_condition_size = 1 

  # Baidu Analytics
  ba_track_id = ""
  
  # We need a proxy to access Disqus api in China
  # Follow https://github.com/zhaohuabing/disqus-php-api to set up your own disqus proxy
  disqus_proxy = ""
  disqus_site = ""

  # Twikoo comments
  # Follow https://twikoo.js.org/ to set up your own env_id
  twikoo_env_id = ""

  # Artalk comments
  # Follow https://artalk.js.org/ to set up your own server
  artalk_enable = false
  artalk_server = "https://xxx.xxx.com"
  artalk_site = "xxx blog"

  #Enable wechat pay & alipay to allow readers send reward money if they like the articles 
  reward = false 
  # reward_guide = "" 

  friends = true
  bookmarks = false
  about_me = true

  # Last posts
  last_posts = true
  #last_posts_title = "LAST POSTS"
  #last_posts_count = 5

  # Include any custom CSS and/or JS files, url or relative to /static folder
  #custom_css = ["css/lightbox.css", "https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.2/animate.min.css", "css/main.css"]
  #custom_js = ["js/lightbox.js", "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js", "js/main.js"]

  [params.social]
  rss            = true 
  email          = "lesseuloirblog@gmail.com"
  #facebook      = "full profile url in facebook"
  #googleplus    = "full profile url in googleplus"
  #twitter       = "full profile url in twitter"
  #linkedin       = "https://www.linkedin.com/in/yourlinkedinid"
  #stackoverflow  = "https://stackoverflow.com/users/yourstackoverflowid"
  #instagram     = "full profile url in instagram"
  #github         = "https://github.com/yourgithub"
  #wechat         = "your wechat qr code image"
  #medium        = "full profile url in medium"
  #slack         = "full workspace url in slack"
  #pinterest     = "full profile url in pinterest"
  #reddit        = "full profile url in reddit"
  #gitlab        = "full profile url in gitlab"
  mastodon      = "https://mastodon.social/@haslam_atufal"
  #keybase       = "full profile url in keybase"
  #xing          = "https://www.xing.com/profile/yourxingid"
  #git           = "full profile url for git user"

  [[params.additional_menus]]
  title =  "ARCHIVE"
  href =  "archive"
  [[params.additional_menus]]
  title =  "ABOUT"
  href =  "about"

[outputFormats.Algolia]
baseName = "algolia"
isPlainText = true
mediaType = "application/json"
notAlternative = true

[params.algolia]
vars = ["title", "summary", "date", "publishdate", "expirydate", "permalink"]
params = ["categories", "tags"] 

[[params.friend_link]]
title =  "La Dame du Lac"
href =  "https://www.puipuit.fr"

[[params.friend_link]]
title =  "Ordinaire"
href =  "https://ordinaire.org"


[[params.friend_link]]
title =  "Outside Dana Hilliot"
href = "https://outsiderland.com/danahilliot"

[markup]
  [markup.tableOfContents]
    endLevel = 2
    startLevel = 1
  [markup.highlight]
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

[mediaTypes]
  [mediaTypes.'font/woff']
    suffixes = ['woff']
  [mediaTypes.'font/woff2']
    suffixes = ['woff2']