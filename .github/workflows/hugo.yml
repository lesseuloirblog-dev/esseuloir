name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"] # Runs every time you push to main
  workflow_dispatch:   # Allows you to run this manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # CRITICAL: Tells GitHub to pull your theme submodule
          fetch-depth: 0         # Required for Hugo's .Lastmod feature

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true        # Matches our local 'extended' requirement # --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://lesseuloirblog-dev.github.io/esseuloir/" \
            --relativeURLs


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
